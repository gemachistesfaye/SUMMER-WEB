<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="clock-wrapper">
        <div class="clock">
            <div class="clock-face">
                <!-- Tick marks -->
                <div class="tick tick-hour" style="--i:0"></div>
                <div class="tick tick-hour" style="--i:1"></div>
                <div class="tick tick-hour" style="--i:2"></div>
                <div class="tick tick-hour" style="--i:3"></div>
                <div class="tick tick-hour" style="--i:4"></div>
                <div class="tick tick-hour" style="--i:5"></div>
                <div class="tick tick-hour" style="--i:6"></div>
                <div class="tick tick-hour" style="--i:7"></div>
                <div class="tick tick-hour" style="--i:8"></div>
                <div class="tick tick-hour" style="--i:9"></div>
                <div class="tick tick-hour" style="--i:10"></div>
                <div class="tick tick-hour" style="--i:11"></div>

                <!-- Numbers -->
                <div class="number" style="--i:0"><span>12</span></div>
                <div class="number" style="--i:1"><span>1</span></div>
                <div class="number" style="--i:2"><span>2</span></div>
                <div class="number" style="--i:3"><span>3</span></div>
                <div class="number" style="--i:4"><span>4</span></div>
                <div class="number" style="--i:5"><span>5</span></div>
                <div class="number" style="--i:6"><span>6</span></div>
                <div class="number" style="--i:7"><span>7</span></div>
                <div class="number" style="--i:8"><span>8</span></div>
                <div class="number" style="--i:9"><span>9</span></div>
                <div class="number" style="--i:10"><span>10</span></div>
                <div class="number" style="--i:11"><span>11</span></div>

                <!-- Hands -->
                <div class="hand hour-hand"></div>
                <div class="hand minute-hand"></div>
                <div class="hand second-hand"></div>

                <!-- Center dot -->
                <div class="center-dot"></div>
            </div>
        </div>

        <!-- Digital display -->
        <div class="digital-display">
            <div class="digital-time" id="digitalTime">00:00:00</div>
            <div class="digital-date" id="digitalDate">Loading...</div>
        </div>

        <!-- Brand -->
        <div class="brand">
            <i class="fas fa-clock"></i> SUMMER TIME
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
