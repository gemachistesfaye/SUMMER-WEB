<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="clock-wrapper">
        <div class="clock">
            <div class="clock-face">
                <!-- Minute ticks (generated by JS) -->
                <div id="minuteTicks"></div>
                <!-- Hour ticks -->
                <div id="hourTicks"></div>
                <!-- Numbers -->
                <div id="numbers"></div>
                <!-- Hands -->
                <div class="hand hour-hand" id="hourHand"></div>
                <div class="hand minute-hand" id="minuteHand"></div>
                <div class="hand second-hand" id="secondHand"></div>
                <!-- Center dot -->
                <div class="center-dot"></div>
                <!-- Glow ring -->
                <div class="glow-ring"></div>
            </div>
        </div>

        <!-- Digital display -->
        <div class="digital-display">
            <div class="digital-time" id="digitalTime">00:00:00</div>
            <div class="digital-date" id="digitalDate">Loading...</div>
        </div>

        <!-- Tabs: World Clock | Stopwatch -->
        <div class="tabs">
            <button class="tab active" data-tab="world"><i class="fas fa-globe"></i> World</button>
            <button class="tab" data-tab="stopwatch"><i class="fas fa-stopwatch"></i> Stopwatch</button>
        </div>

        <!-- World Clock -->
        <div class="panel" id="worldPanel">
            <div class="world-clock" id="worldClocks"></div>
        </div>

        <!-- Stopwatch -->
        <div class="panel hidden" id="stopwatchPanel">
            <div class="stopwatch-display" id="stopwatchDisplay">00:00:00.000</div>
            <div class="stopwatch-buttons">
                <button class="sw-btn sw-start" id="swStart"><i class="fas fa-play"></i></button>
                <button class="sw-btn sw-lap" id="swLap" disabled><i class="fas fa-flag"></i></button>
                <button class="sw-btn sw-reset" id="swReset" disabled><i class="fas fa-redo"></i></button>
            </div>
            <div class="laps" id="laps"></div>
        </div>

        <!-- Brand -->
        <div class="brand">
            <i class="fas fa-clock"></i> SUMMER TIME
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
