<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <!-- Header -->
            <div class="app-header">
                <div class="header-top">
                    <h2><i class="fas fa-check-double"></i> My Tasks</h2>
                    <p class="app-subtitle" id="dateDisplay"></p>
                </div>
                <!-- Progress Bar -->
                <div class="progress-wrap">
                    <div class="progress-info">
                        <span>Progress</span>
                        <span id="progressPercent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                </div>
            </div>

            <!-- Input -->
            <div class="input-wrap">
                <input type="text" id="input-box" placeholder="Add a new task..." autofocus>
                <button id="add-button"><i class="fas fa-plus"></i></button>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">To Do</button>
                    <button class="filter-btn" data-filter="done">Done</button>
                </div>
                <span class="task-count" id="taskCount">0 tasks</span>
            </div>

            <!-- Task List -->
            <ul id="list-container"></ul>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">🎉</div>
                <h3>All caught up!</h3>
                <p>Add a task above to get started</p>
            </div>

            <!-- Clear Done -->
            <div class="footer-bar hidden" id="clearAll">
                <button id="clearAllBtn"><i class="fas fa-broom"></i> Clear completed</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
