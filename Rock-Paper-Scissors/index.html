<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="game-wrapper">
        <!-- Header -->
        <h1><i class="fas fa-gamepad"></i> Rock Paper Scissors</h1>

        <!-- Mode Selector -->
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="classic">Classic</button>
            <button class="mode-btn" data-mode="best5">Best of 5</button>
            <button class="mode-btn" data-mode="best10">Best of 10</button>
        </div>

        <!-- Score Board -->
        <div class="score-board">
            <div class="score-side you">
                <div class="badge">YOU</div>
                <div class="score-num" id="user-score">0</div>
            </div>
            <div class="score-divider">:</div>
            <div class="score-side comp">
                <div class="badge">CPU</div>
                <div class="score-num" id="computer-score">0</div>
            </div>
        </div>

        <!-- Streak -->
        <div class="streak hidden" id="streak">
            <i class="fas fa-fire"></i> <span id="streakText"></span>
        </div>

        <!-- Result -->
        <div class="result" id="result">
            <div class="result-icon" id="resultIcon"></div>
            <p class="result-text" id="resultText">Make your move!</p>
        </div>

        <!-- VS Display -->
        <div class="vs-display hidden" id="vsDisplay">
            <div class="vs-choice" id="vsUser"></div>
            <span class="vs-text">VS</span>
            <div class="vs-choice" id="vsComp"></div>
        </div>

        <!-- Choices -->
        <div class="choices">
            <div class="choice" id="r" data-choice="r">
                <span class="choice-emoji">🪨</span>
                <span class="choice-label">Rock</span>
            </div>
            <div class="choice" id="p" data-choice="p">
                <span class="choice-emoji">📄</span>
                <span class="choice-label">Paper</span>
            </div>
            <div class="choice" id="s" data-choice="s">
                <span class="choice-emoji">✂️</span>
                <span class="choice-label">Scissors</span>
            </div>
        </div>

        <!-- Action Message -->
        <p class="action-message" id="action-message">Choose your weapon!</p>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat"><span id="wins">0</span><p>Wins</p></div>
            <div class="stat"><span id="losses">0</span><p>Losses</p></div>
            <div class="stat"><span id="draws">0</span><p>Draws</p></div>
            <div class="stat"><span id="winRate">0%</span><p>Win Rate</p></div>
        </div>

        <!-- Reset -->
        <button class="btn-reset" id="resetBtn"><i class="fas fa-rotate-right"></i> Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
