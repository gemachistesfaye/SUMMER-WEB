<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>

    <div class="score-board">
        <div id="user-label" class="badge"> You</div>
        <div id="computer-label" class="badge">Comp</div>
        <span id="user-score">0</span>: <span id="computer-score">0</span>
    </div>

    <div class="result">
        <p>Make your move!</p>
    </div>

    <div class="choices">
        <div class="choice" id="r"><img src="images/rock.png" alt="Rock"></div>
        <div class="choice" id="p"><img src="images/paper.png" alt="Paper"></div>
        <div class="choice" id="s"><img src="images/scissors.png" alt="Scissors"></div>

    </div>

    <p id="action-message">Choose your weapon! </p>
    <script src="script.js"></script>
    
</body>
</html>
